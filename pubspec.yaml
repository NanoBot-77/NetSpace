name: netspace
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_image_slideshow: ^0.1.6
  flutter_launcher_icons: ^0.14.2
  flutter_link_previewer: ^3.2.2
  flutter_native_splash: ^2.4.3
  flutter_story_presenter: ^1.0.3
  google_fonts: ^6.2.1
  http: ^1.3.0
  infinite_carousel: ^1.1.1
  permission_handler: ^11.3.1
  pod_player: ^0.2.2
  video_player: ^2.9.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/Icons/

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/Icons/App_Icon.png"